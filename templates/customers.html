{% extends "base.html" %}
{% block title %}客户库 · AI 销售助理{% endblock %}
{% block content %}
<div class="module-header">
    <div class="container">
        <h2><i class="bi bi-people"></i> 客户库</h2>
        <p class="mb-0 opacity-75">管理你的目标客户，AI 会根据阶段自动推荐跟进节奏</p>
    </div>
</div>
<div class="container">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header"><i class="bi bi-plus-circle"></i> 新增客户</div>
                <div class="card-body">
                    <form id="c-form">
                        <div class="mb-2"><input class="form-control" placeholder="姓名 *" id="c-name" required></div>
                        <div class="mb-2"><input class="form-control" placeholder="公司" id="c-company"></div>
                        <div class="mb-2"><input class="form-control" placeholder="行业" id="c-industry"></div>
                        <div class="mb-2"><input class="form-control" placeholder="联系方式" id="c-contact"></div>
                        <div class="mb-2">
                            <select class="form-select" id="c-stage">
                                <option>初次接触</option><option>需求确认</option>
                                <option>方案报价</option><option>决策等待</option><option>已成交</option>
                            </select>
                        </div>
                        <div class="mb-2"><textarea class="form-control" rows="2" placeholder="备注" id="c-notes"></textarea></div>
                        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-check-lg"></i> 添加</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-list-ul"></i> 客户列表</span>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadC()"><i class="bi bi-arrow-clockwise"></i></button>
                </div>
                <div class="card-body"><div id="c-list">加载中…</div></div>
            </div>
        </div>
    </div>
</div>

<script>
const STAGES = ['初次接触','需求确认','方案报价','决策等待','已成交'];
async function loadC() {
    const r = await fetch('/api/customers/list').then(r => r.json());
    const box = document.getElementById('c-list');
    if (!r.customers.length) {
        box.innerHTML = '<p class="text-muted text-center py-4">还没有客户，先添加一个吧</p>';
        return;
    }
    box.innerHTML = '<table class="table table-hover"><thead><tr><th>姓名</th><th>公司</th><th>行业</th><th>阶段</th><th></th></tr></thead><tbody>' +
        r.customers.map(c => `
            <tr>
                <td><strong>${c.name}</strong><br><small class="text-muted">${c.contact || ''}</small></td>
                <td>${c.company || '-'}</td>
                <td>${c.industry || '-'}</td>
                <td>
                    <select class="form-select form-select-sm" onchange="upd(${c.id}, this.value)">
                        ${STAGES.map(s => `<option ${s === c.stage ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" href="/followup?name=${encodeURIComponent(c.name)}&stage=${encodeURIComponent(c.stage)}"><i class="bi bi-arrow-right"></i> 跟进</a>
                    <button class="btn btn-sm btn-outline-danger" onclick="delC(${c.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`).join('') + '</tbody></table>';
}

async function upd(id, stage) {
    await fetch('/api/customers/update/' + id, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({stage})});
    loadC();
}
async function delC(id) {
    if (!confirm('删除？')) return;
    await fetch('/api/customers/delete/' + id, {method: 'DELETE'});
    loadC();
}

document.getElementById('c-form').onsubmit = async e => {
    e.preventDefault();
    const body = {
        name: document.getElementById('c-name').value,
        company: document.getElementById('c-company').value,
        industry: document.getElementById('c-industry').value,
        contact: document.getElementById('c-contact').value,
        stage: document.getElementById('c-stage').value,
        notes: document.getElementById('c-notes').value,
    };
    await fetch('/api/customers/add', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
    document.getElementById('c-form').reset();
    loadC();
};
loadC();
</script>
{% endblock %}
