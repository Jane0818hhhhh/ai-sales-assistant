{% extends "base.html" %}
{% block title %}异议处理教练{% endblock %}
{% block content %}
<div class="module-header">
    <div class="container">
        <h2><i class="bi bi-shield-check"></i> 异议处理教练</h2>
        <p class="mb-0 opacity-75">遇到"太贵了"、"再考虑一下"？AI 教你 4 步框架 + 逐字话术</p>
    </div>
</div>
<div class="container">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-body">
                    <label class="form-label fw-bold">客户说了什么？*</label>
                    <textarea class="form-control" id="objection" rows="4" placeholder="比如：你们价格太贵了 / 我再考虑一下 / 已经在用竞品了"></textarea>
                    <label class="form-label fw-bold mt-3">背景补充（可选）</label>
                    <textarea class="form-control" id="context" rows="3" placeholder="如：客户是金融业 CIO，预算 50 万，已谈了两次"></textarea>
                    <button class="btn btn-primary w-100 mt-3" id="btn-go"><i class="bi bi-lightbulb"></i> 生成应对策略</button>

                    <div class="mt-3">
                        <div class="small text-muted mb-2">常见异议速填：</div>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-secondary" onclick="fill(this)">价格太贵了</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="fill(this)">我再考虑一下</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="fill(this)">已经在用竞品</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="fill(this)">等预算下来再说</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="fill(this)">需要老板同意</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div id="result" class="d-none">
                <div class="card result-card">
                    <div class="card-body">
                        <h5>🎯 <span id="r-type"></span> <span class="source-tag" id="r-source"></span></h5>
                        <p><strong>核心策略：</strong><span id="r-strategy"></span></p>

                        <h6 class="mt-3">📐 4 步应对框架</h6>
                        <ol id="r-framework"></ol>

                        <h6 class="mt-3">💬 建议话术</h6>
                        <div class="alert alert-primary" id="r-script" style="white-space:pre-wrap;"></div>

                        <h6 class="mt-3">📚 同行业案例</h6>
                        <div class="alert alert-secondary mb-0" id="r-cases"></div>
                    </div>
                </div>
            </div>
            <div id="empty" class="text-center text-muted py-5">
                <div style="font-size:4rem;">🛡️</div>
                <p>输入客户异议后，AI 会给出应对方案</p>
            </div>
        </div>
    </div>
</div>

<script>
function fill(btn) { document.getElementById('objection').value = btn.textContent; }

document.getElementById('btn-go').onclick = async () => {
    const objection = document.getElementById('objection').value.trim();
    if (!objection) { alert('请输入客户异议'); return; }
    const context = document.getElementById('context').value.trim();
    const btn = document.getElementById('btn-go');
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> 生成中…';
    try {
        const r = await fetch('/api/objection', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({objection, context})}).then(r => r.json());
        document.getElementById('empty').classList.add('d-none');
        document.getElementById('result').classList.remove('d-none');
        const d = r.data || {};
        document.getElementById('r-type').textContent = d.type || '异议';
        const tag = document.getElementById('r-source');
        tag.className = 'source-tag ' + r.source;
        tag.textContent = r.source === 'real' ? '真实 AI' : 'Mock';
        document.getElementById('r-strategy').textContent = d.strategy || '-';
        document.getElementById('r-framework').innerHTML = (d.response_framework || []).map(x => `<li>${x}</li>`).join('') || '<li class="text-muted">-</li>';
        document.getElementById('r-script').textContent = d.suggested_script || r.raw;
        document.getElementById('r-cases').textContent = d.similar_cases || '-';
    } catch (e) { alert('失败：' + e); }
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-lightbulb"></i> 生成应对策略';
};
</script>
{% endblock %}
